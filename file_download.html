<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>工具下载 - 我的个人小站</title>
    <link rel="stylesheet" href="style.css">

    <!-- 百度统计嵌入代码 -->
    <script>
        var _hmt = _hmt || [];
        (function() {
          var hm = document.createElement("script");
          hm.src = "https://hm.baidu.com/hm.js?8b49f040d857f35c106fd70283abd7b8";
          var s = document.getElementsByTagName("script")[0]; 
          s.parentNode.insertBefore(hm, s);
        })();
    </script>

</head>
<body>
    <header>
        <nav>
            <div class="logo">我的空间</div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="games.html">小游戏</a></li>
                <li><a href="file_download.html" class="active">工具下载</a></li>
                <li><a href="contact.html">留言板</a></li>
            </ul>
        </nav>
    </header>

    <section class="content" style="padding: 50px 10%;">
        <h2>常用文件</h2>

        <!-- ===== 管理员区域 ===== -->
        <div class="admin-area" id="adminArea">
            <h3>🔐 管理员操作</h3>
            <div id="loginForm">
                <label for="adminPwd">请输入管理员密码：</label>
                <input type="password" id="adminPwd" placeholder="输入密码后按回车或点击验证" autocomplete="off">
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="verifyPassword()">验证</button>
                </div>
            </div>
            <div id="adminPanel" style="display:none;">
                <p style="color:#27ae60; font-weight:600;">✅ 管理员验证通过</p>
                <button class="btn btn-logout" onclick="logoutAdmin()">退出管理</button>
                <!-- 上传区域 -->
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <p><strong>拖拽文件到此处</strong> 或点击下方按钮选择</p>
                    <p style="font-size:12px;color:#999;">文件将保存到 download_file 目录</p>
                    <label class="browse-btn" for="fileInput">选择文件</label>
                    <input type="file" id="fileInput" multiple>
                    <div class="selected-file" id="selectedFile"></div>
                    <button class="upload-submit" id="uploadBtn" disabled onclick="uploadFiles()">上传文件</button>
                    <div class="upload-status" id="uploadStatus"></div>
                </div>
            </div>
        </div>

        <!-- ===== 文件下载列表 ===== -->
        <div class="download-list" id="downloadList">
            <div class="status info" style="padding:10px;color:#888;">正在加载文件列表...</div>
        </div>
    </section>

    <footer>
        <p>© 2025 我的个人空间. 保留所有权利。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
