<body>

    <!--<div class="container">-->
        <div class="main-content">
            <section class="form-section">
                <h2>发布留言</h2>
                <form id="messageForm">
                    <div class="form-group">
                        <label for="author">您的姓名 *</label>
                        <input type="text" id="author" required placeholder="请输入您的姓名">
                    </div>
					
                    <div class="form-group">
                        <label for="message">留言内容 *</label>
                        <textarea id="message" required placeholder="请输入您的留言内容..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>上传文件（可选）</label>
                        <div class="file-upload" id="fileUploadArea">
                            <p>📁 点击选择文件或拖拽文件到这里</p>
                            <p style="font-size: 0.9rem; opacity: 0.7;">支持图片、文档等文件（最大25MB）</p>
                            <input type="file" id="fileInput" style="display: none;">
                        </div>
                        
                        <div class="file-preview" id="filePreview">
                            <div class="file-info">
                                <span id="fileName">文件名</span>
                                <span id="fileSize" style="font-size: 0.9rem; opacity: 0.7;"></span>
                                <button type="button" onclick="clearFileSelection()" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">移除</button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="status"></div>
                    
                    <button type="submit" class="btn btn-success" id="submitBtn">
                        发布留言
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="loadMessages()">
                        刷新留言
                    </button>
                </form>
            </section>
            
            <section class="messages-section">
                <h2>留言列表</h2>
                <div id="messagesContainer">
                    <div class="status info">正在加载留言...</div>
                </div>
            </section>
        </div>
        
        <section class="config-section">
            <details>
                <summary>GitHub配置说明</summary>
                <p>此留言板使用GitHub作为后端存储：</p>
                <ul>
                    <li>留言数据存储在GitHub Issues中</li>
                    <li>上传的文件存储在GitHub仓库中</li>
                    <li>Personal Access Token Expires on 20xx.xx.xx </li>
                </ul>
                <p class="github-info">确保您的GitHub仓库已启用Issues功能，并且Token具有相应权限。</p>
            </details>
        </section>
    <!--</div>-->
